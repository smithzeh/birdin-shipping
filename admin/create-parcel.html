<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Parcel</title>
  <link rel="stylesheet" href="../styles.css">
  <script type="module" src="admin.js"></script>
</head>
<body>
  <h1>Create New Parcel</h1>

  <form id="parcel-form">
    <h3>Sender Information</h3>
    <input id="sender_name" type="text" placeholder="Sender Name" required>
    <input id="sender_email" type="email" placeholder="Sender Email" required>
    <input id="sender_address" type="text" placeholder="Sender Address" required>

    <h3>Receiver Information</h3>
    <input id="receiver_name" type="text" placeholder="Receiver Name" required>
    <input id="receiver_email" type="email" placeholder="Receiver Email" required>
    <input id="receiver_address" type="text" placeholder="Receiver Address" required>

    <h3>Shipment Details</h3>
    <input id="destination" type="text" placeholder="Destination Country / City" required>
    <textarea id="parcel_details" placeholder="Package Details"></textarea>

    <h3>Dates</h3>
    <label>Date Sent</label>
    <input id="date_sent" type="date" required>
    <label>Expected Delivery</label>
    <input id="expected_delivery" type="date" required>

    <h3>Status</h3>
    <select id="status">
      <option value="Pending">Pending</option>
      <option value="Shipped">Shipped</option>
      <option value="In Transit">In Transit</option>
      <option value="Out for Delivery">Out for Delivery</option>
      <option value="Delivered">Delivered</option>
    </select>

    <input id="current_location" type="text" placeholder="Current Location">
    <br><br>
    <button type="submit">Create Parcel</button>
  </form>

  <h2>Parcels List</h2>
  <table border="1">
    <thead>
      <tr>
        <th>Tracking Code</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Current Location</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="parcel-list">
      <!-- Parcels will load here -->
    </tbody>
  </table>
</body>
</html>
