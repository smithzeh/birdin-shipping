<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Courier Service</title>
<link rel="stylesheet" href="./admin-styles.css">

<style>
/* Popup styling */
#parcel-form{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:350px;
z-index:1000;
display:none;
}

#parcel-form input,
#parcel-form textarea,
#parcel-form select{
width:100%;
margin-bottom:10px;
padding:8px;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:999;
}
</style>

</head>

<body>

<header>
<img src="logo.png" alt="Birdin Shipment">
<h1>Admin Panel</h1>
</header>

<main>

<section>
<h2>Welcome to the Admin Panel</h2>
<p>Manage your shipments efficiently. Log new parcels, track existing ones, and ensure smooth delivery operations.</p>
<img src="https://share.google/bzvpVB4VosHoySwB0" alt="Courier Service" style="width: 100%; border-radius: 8px;">
</section>

<section>

<h2>Dashboard</h2>

<button id="create-parcel">Create Parcel</button>

<table>

<thead>
<tr>
<th>Tracking Code</th>
<th>Sender</th>
<th>Receiver</th>
<th>Current Location</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="parcel-list">
</tbody>

</table>

</section>

</main>

<footer>
<p>&copy; 2026 Courier Service</p>
</footer>


<!-- Overlay -->
<div id="overlay"></div>

<!-- Popup Form -->
<div id="parcel-form">

<h3>Create Parcel</h3>

<form id="form">

<input id="sender" placeholder="Sender Address" required>

<input id="receiver" placeholder="Receiver Address" required>

<input id="destination" placeholder="Destination Location" required>

<textarea id="details" placeholder="Parcel Details"></textarea>

<label>Date Sent</label>
<input type="date" id="dateSent">

<label>Expected Delivery</label>
<input type="date" id="deliveryDate">

<select id="status">
<option value="Pending">Pending</option>
<option value="Shipped">Shipped</option>
<option value="Delivered">Delivered</option>
</select>

<input id="location" placeholder="Current Location">

<button type="submit">Save Parcel</button>
<button type="button" id="close-form">Cancel</button>

</form>

</div>


<script>

const createBtn = document.getElementById("create-parcel")
const formPopup = document.getElementById("parcel-form")
const overlay = document.getElementById("overlay")
const closeBtn = document.getElementById("close-form")

createBtn.onclick = () => {
formPopup.style.display = "block"
overlay.style.display = "block"
}

closeBtn.onclick = () => {
formPopup.style.display = "none"
overlay.style.display = "none"
}

overlay.onclick = () => {
formPopup.style.display = "none"
overlay.style.display = "none"
}

</script>

<script type="module" src="./admin.js"></script>

</body>
</html>
