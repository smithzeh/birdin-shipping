<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Birdin Shipment</title>
<link rel="stylesheet" href="./admin-styles.css">
<style>
/* Popup styling */
#parcel-form-popup{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  width: 350px;
  z-index: 1000;
  display: none;
}

#parcel-form-popup input,
#parcel-form-popup textarea,
#parcel-form-popup select{
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

#overlay{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 999;
}

button:hover {
  cursor: pointer;
  box-shadow: 0 0 8px #ff6600;
  transform: scale(1.02);
  transition: all 0.2s;
}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Birdin Shipment">
  <h1>Admin Panel</h1>
</header>

<main>
<section>
  <h2>Welcome to the Admin Panel</h2>
  <p>Manage shipments and update delivery status.</p>
  <img src="Plane.png" alt="Courier Service" style="width:100%; border-radius:8px;">
</section>

<section>
  <h2>Dashboard</h2>
  <button id="create-parcel">Create Parcel</button>
  <table>
    <thead>
      <tr>
        <th>Tracking Code</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Current Location</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="parcel-list"></tbody>
  </table>
</section>
</main>

<footer>
  <p>© 2026 Birdin Shipment</p>
</footer>

<div id="overlay"></div>

<!-- PARCEL FORM POPUP -->
<div id="parcel-form-popup">
  <h3>Create / Edit Parcel</h3>
  <form id="parcelForm">
    <input type="hidden" id="parcel_id">
    <input id="sender_name" placeholder="Sender Name" required>
    <input id="sender_email" placeholder="Sender Email">
    <input id="sender_address" placeholder="Sender Address">
    <input id="receiver_name" placeholder="Receiver Name" required>
    <input id="receiver_email" placeholder="Receiver Email">
    <input id="receiver_address" placeholder="Receiver Address">
    <input id="destination" placeholder="Destination Location" required>
    <textarea id="parcel_details" placeholder="Parcel Details"></textarea>
    <label>Date Sent</label>
    <input type="date" id="date_sent">
    <label>Expected Delivery</label>
    <input type="date" id="expected_delivery">
    <label>Status</label>
    <select id="status">
      <option value="pending">Pending</option>
      <option value="shipped">Shipped</option>
      <option value="in transit">In Transit</option>
      <option value="delivered">Delivered</option>
    </select>
    <input id="current_location" placeholder="Current Location">
    <button type="submit">Save Parcel</button>
    <button type="button" id="close-form">Cancel</button>
  </form>
</div>

<script type="module" src="./admin.js"></script>

</body>
</html>
