<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Parcel</title>
    <link rel="stylesheet" href="./admin-styles.css">
</head>
<body>
    <header>
        <img src="../public/logo.png" alt="Birdin Shipment Logo">
        <h1>Create Parcel</h1>
    </header>
    <main>
        <section>
            <form id="create-parcel-form">
                <label for="tracking-code">Tracking Code:</label>
                <input type="text" id="tracking-code" name="tracking-code" required>

                <label for="sender-name">Sender Name:</label>
                <input type="text" id="sender-name" name="sender-name" required>

                <label for="receiver-name">Receiver Name:</label>
                <input type="text" id="receiver-name" name="receiver-name" required>

                <label for="sender-location">Sender Location:</label>
                <input type="text" id="sender-location" name="sender-location" required>

                <label for="receiver-location">Receiver Location:</label>
                <input type="text" id="receiver-location" name="receiver-location" required>

                <label for="parcel-details">Parcel Details:</label>
                <textarea id="parcel-details" name="parcel-details" required></textarea>

                <label for="estimated-days">Estimated Days:</label>
                <input type="number" id="estimated-days" name="estimated-days" required>

                <button type="submit">Create Parcel</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Courier Service</p>
    </footer>
    <script type="module" src="./admin.js"></script>
</body>
</html>
