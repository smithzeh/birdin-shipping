<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courier Service - Home</title>
    <link rel="stylesheet" href="./styles.css"> <!-- updated -->
</head>
<body>
    <header>
        <img src="./logo.png" alt="Birdin Shipment Logo">
        <h1>Courier Service</h1>
    </header>
    <main>
        <section>
            <h2>Track Your Shipment</h2>
            <form id="tracking-form">
                <label for="customer-tracking-code">Enter Tracking Code:</label>
                <input type="text" id="customer-tracking-code" name="customer-tracking-code" required>
                <button type="submit">Track</button>
            </form>
            <div id="tracking-result"></div>
        </section>
        <section>
            <h2>About Our Service</h2>
            <p>We ensure your parcels are delivered safely and on time. Track your shipments in real-time and enjoy reliable courier services.</p>
            <img src="https://via.placeholder.com/600x300" alt="Courier Service" style="width: 100%; border-radius: 8px;">
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Courier Service</p>
    </footer>
    <script type="module" src="./script.js"></script>
</body>
</html>
